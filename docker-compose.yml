version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: secure_bounty_postgres
    environment:
      POSTGRES_DB: secure_bounty
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
